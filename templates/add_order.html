{% extends "base.html" %}

{% block title %}加入拼单{% endblock %}

{% block content %}
<section class="page-heading">
    <div>
        <p class="eyebrow">Order Item</p>
        <h1>加入拼单</h1>
    </div>
    <a class="back-link" href="{{ url_for('index') }}">返回首页</a>
</section>

{% if message %}
<div class="notice notice--{{ message_type }}" role="status">{{ message }}</div>
{% endif %}

<form class="form-panel" method="post">
    <div class="form-grid">
        <label class="field">
            <span>拼单编号</span>
            <input type="number" name="group_order_id" min="1" required value="{{ form_data.group_order_id }}">
        </label>

        <label class="field">
            <span>学生编号</span>
            <input type="number" name="student_id" min="1" required value="{{ form_data.student_id }}">
        </label>

        <label class="field">
            <span>饮品编号</span>
            <input type="number" name="drink_id" min="1" required value="{{ form_data.drink_id }}">
        </label>

        <label class="field">
            <span>购买数量</span>
            <input type="number" name="quantity" min="1" required value="{{ form_data.quantity }}">
        </label>

        <label class="field">
            <span>优惠券编号</span>
            <input type="number" name="coupon_id" min="1" value="{{ form_data.coupon_id }}">
        </label>
    </div>

    <div class="button-row">
        <button class="primary-button" type="submit">提交订单</button>
    </div>
</form>
{% endblock %}
