<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}校园奶茶拼单系统{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="topbar">
        <div class="topbar__inner">
            <div class="topbar__brand-row">
                <a class="brand" href="{{ url_for('index') }}">校园奶茶拼单系统</a>
                <span class="stage-badge">P1 Demo</span>
            </div>
            <nav class="topnav" aria-label="主导航">
                <a href="{{ url_for('index') }}">首页</a>
                <a href="{{ url_for('add_order') }}">加入拼单</a>
                <a href="{{ url_for('finish_group') }}">完成拼单</a>
                <a href="{{ url_for('cancel_group') }}">取消拼单</a>
                <a href="{{ url_for('query_group') }}">详情查询</a>
                <a href="{{ url_for('data_students') }}">学生</a>
                <a href="{{ url_for('data_shops') }}">店铺</a>
                <a href="{{ url_for('data_drinks') }}">饮品</a>
                <a href="{{ url_for('data_coupons') }}">优惠券</a>
                <a href="{{ url_for('operation_logs') }}">日志</a>
            </nav>
        </div>
    </header>

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
